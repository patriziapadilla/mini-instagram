    :root{
      --bg:#050505;
      --panel:#0b0b0b;
      --line:rgba(255,255,255,.10);
      --gold:#dcc2a2;
      --cream:#efe2d4;
      --text:#f8efe7;
      --muted:rgba(248,239,231,.78);
      --shadow:0 24px 70px rgba(0,0,0,.34);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:#000;
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
      overflow:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button{
      font:inherit;
      border:none;
      background:none;
      color:inherit;
      cursor:pointer;
    }

    .app{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#000;
      position:relative;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:50;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      padding:14px 16px;
      background:linear-gradient(180deg, rgba(0,0,0,.65), rgba(0,0,0,.08));
      pointer-events:none;
    }

    .topbar > *{
      pointer-events:auto;
    }

    .topbar-center{
      text-align:center;
      flex:1;
      min-width:0;
    }

    .brand{
      margin:0;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(22px,2.6vw,34px);
      font-weight:500;
      color:var(--gold);
      letter-spacing:.02em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .deck{
      height:100vh;
      display:flex;
      overflow-x:auto;
      overflow-y:hidden;
      scroll-snap-type:x mandatory;
      scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
    }

    .deck::-webkit-scrollbar{
      display:none;
    }

    .slide{
      flex:0 0 100vw;
      width:100vw;
      height:100vh;
      scroll-snap-align:start;
      position:relative;
      overflow:hidden;
      background:#000;
    }

    .slide-inner{
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      opacity:.55;
      transform:scale(.94);
      transition:opacity .45s ease, transform .45s ease;
    }

    .slide.active .slide-inner{
      opacity:1;
      transform:scale(1);
    }

    .home-video-wrap{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
    }

    .home-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:0;
      background:#000;
    }

    .home-overlay{
      position:absolute;
      inset:0;
      z-index:1;

      align-items:center;
      justify-content:center;
      text-align:center;
      padding:90px 20px 190px;
      position:relative;
      z-index:2;
    }

    .headline{

      font-family:Georgia,"Times New Roman",serif;

      font-weight:500;
      color:#fff9f1;

    .areas{

    .offer b{

    .home-tagline{

      border:1px solid rgba(255,255,255,.14);
      color:#fff8ef;
      font-size:15px;
      font-weight:700;

    .pick{

    }

    .pick-sub{

    }

      left:0;
      right:0;
      bottom:0;
      z-index:3;

      gap:2px;
      padding:0 0 8px;

      text-align:left;
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      padding:0 14px;
      background:#030303;
      border-top:1px solid var(--line);
      border-bottom:1px solid var(--line);
      border-left:none;
      border-right:none;
      border-radius:0;
      font-family:Georgia,"Times New Roman",serif;
      color:#fff8ef;
      margin:0;
      min-width:0;

    .rail-btn{

      line-height:1;

    .mini-rail-btn{

      font-size:12px;
      line-height:1;

      height:100%;

      background:#0e0e0e;

      display:block;
      background:#111;

      align-items:center;
      justify-content:center;
      border-radius:999px;
      font-size:16px;
      font-weight:800;
      border:1px solid rgba(255,255,255,.14);
      padding:0 14px;
      text-align:center;

    .btn.light{
      background:transparent;
      color:#fff;
    }

    .btn.gold{
      background:var(--cream);
      color:#111;
      border-color:transparent;
    }

    .results-note{
      margin-top:10px;
      text-align:center;
      font-size:11px;
      letter-spacing:.04em;
      color:rgba(255,255,255,.62);
    }

      margin-top:12px;
      display:grid;
      gap:4px;
    }

    .whatsapp-float{
      position:fixed;
      right:16px;
      bottom:16px;
      z-index:60;
      width:54px;
      height:54px;
      border-radius:50%;

      align-items:center;
      justify-content:center;
      background:#25D366;
      color:#fff;
      box-shadow:0 16px 36px rgba(0,0,0,.35);

    .swipe-hint{
      display:none;
    }

    @media (max-width: 920px){
      .treatment-wrap{
        grid-template-columns:1fr;

      }

        height:28px;
        font-size:12px;
        padding:0 12px;
      }

      .mini-rail-btn{
        height:26px;
        font-size:11px;
        padding:0 12px;
      }

      .page-text{
        font-size:15px;
        line-height:1.5;
      }
    }
  </style>
</head>

      `;
    }

    deck.innerHTML = slides.map((slide, index) => {
      if (slide.type === "home") {
        return `
          <section class="slide home-slide active" data-slide="${index}">
            <div class="slide-inner">
              <div class="home-video-wrap">
                <video class="home-video" autoplay muted loop playsinline preload="metadata">
                  <source src="./home-video.mp4" type="video/mp4">
                </video>

                <div class="home-overlay"></div>

                <div class="home-center">
                  <h2 class="headline">${T.headline}</h2>
                  <div class="areas">${T.areas}</div>
                  <div class="offer"><b>25% OFF</b><span>${T.offer}</span></div>
                  <div class="home-tagline">${T.tagline}</div>
                  <a class="offer-phone" href="https://wa.me/17866900960" target="_blank" rel="noopener">${T.phoneLabel}</a>
                </div>

                <div class="home-rail">
                  ${makeHomeRail()}
                </div>
              </div>
            </div>
          </section>
        `;
      }

      return `
        <section class="slide treatment" data-slide="${index}">
          <div class="slide-inner">
            <div class="treatment-wrap">
              <div class="media-pane">
                ${mediaMarkup(slide, index)}
              </div>

              <div class="info-pane">
                <div class="page-card">
                  <div class="page-card-inner">
                    <div class="page-topline">
                      <button class="home-link" data-go="0">‹ ${T.home}</button>
                      <span>${index}/${slides.length - 1}</span>
                    </div>

                    <h2 class="page-title">${getName(slide)}</h2>
                    <p class="page-text">${getText(slide)}</p>

                    <div class="chips">
                      ${getChips(slide).map(c => `<span class="chip">${c}</span>`).join("")}
                    </div>

                    <div class="result-card">
                      <div class="result-lab">${T.results}</div>
                      <img src="${slide.result}" alt="${T.results}">
                    </div>

                    <div class="actions">
                      <a class="btn light" href="${slide.learn}" target="_blank" rel="noopener">${T.learn}</a>
                      <a class="btn gold" href="${slide.book}" target="_blank" rel="noopener">${T.book}</a>
                    </div>

                    <div class="results-note">${T.note}</div>

                    <div class="bottom-nav">
                      ${makeMiniRail(index)}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      `;
    }).join("");

    window.handleVideoError = function(index) {
      const video = document.getElementById(`video-${index}`);
      const fallback = document.getElementById(`fallback-${index}`);
      if (video) video.classList.add('hidden-video');
      if (fallback) fallback.classList.add('show');
    };

    const slideEls = [...document.querySelectorAll('.slide')];

    function setActiveSlide() {
      const left = deck.scrollLeft;
      const width = deck.clientWidth;
      const active = Math.round(left / width);
      slideEls.forEach((el, i) => {
        el.classList.toggle('active', i === active);
      });
    }

    function goToSlide(index) {
      deck.scrollTo({
        left: index * deck.clientWidth,
        behavior: 'smooth'
      });
    }

    document.addEventListener('click', (e) => {
      const go = e.target.closest('[data-go]');
      if (go) {
        goToSlide(Number(go.dataset.go));
      }
    });

    deck.addEventListener('scroll', setActiveSlide);
    window.addEventListener('resize', setActiveSlide);

    deck.addEventListener('wheel', (e) => {
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        e.preventDefault();
        deck.scrollLeft += e.deltaY;
      }
    }, { passive:false });

    setActiveSlide();
  </script>
</body>
</html>

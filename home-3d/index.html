<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D’Royal Spa · Home 3D</title>
  <style>
    :root{
      --bg:#050505;
      --panel:#0b0b0b;
      --line:rgba(255,255,255,.10);
      --gold:#dcc2a2;
      --cream:#efe2d4;
      --text:#f8efe7;
      --muted:rgba(248,239,231,.78);
      --side:16px;
      --strip-h:36px;
      --shadow:0 18px 40px rgba(0,0,0,.28);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:#000;
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
      overflow-x:hidden;
      scroll-behavior:smooth;
    }

    body.overlay-open{
      overflow:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button{
      font:inherit;
      color:inherit;
      background:none;
      border:none;
      padding:0;
      cursor:pointer;
    }

    .home{
      min-height:100svh;
      position:relative;
      display:flex;
      flex-direction:column;
      justify-content:center;
      background:
        linear-gradient(180deg, rgba(0,0,0,.22) 0%, rgba(0,0,0,.36) 34%, rgba(0,0,0,.70) 78%, rgba(0,0,0,.94) 100%),
        url('./modelo.jpg') center 30% / cover no-repeat;
    }

    .topline{
      position:absolute;
      top:14px;
      left:var(--side);
      right:var(--side);
      z-index:3;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      font-size:13px;
      color:rgba(255,255,255,.95);
    }

    .hero-center{
      position:relative;
      z-index:2;
      text-align:center;
      max-width:980px;
      margin:0 auto;
      padding:120px 20px 150px;
    }

    .brand{
      margin:0 0 14px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(28px,3vw,42px);
      font-weight:500;
      color:var(--gold);
    }

    .headline{
      margin:0;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(52px,8vw,96px);
      line-height:.94;
      font-weight:500;
      color:#fff9f0;
    }

    .areas{
      margin-top:20px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(18px,2vw,28px);
      color:#f3e7d8;
    }

    .phone-wrap{
      margin-top:18px;
    }

    .phone{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:50px;
      padding:0 22px;
      border-radius:999px;
      background:var(--cream);
      color:#111;
      font-size:clamp(18px,2vw,24px);
      font-weight:800;
      box-shadow:var(--shadow);
    }

    .email{
      margin-top:10px;
      font-size:14px;
      color:rgba(255,255,255,.82);
    }

    .offer{
      margin-top:14px;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(10,10,10,.34);
    }

    .offer b{
      padding:8px 12px;
      border-radius:999px;
      background:rgba(220,194,162,.18);
      color:#fff4e8;
    }

    .pick{
      margin-top:22px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(18px,2.2vw,30px);
      color:#fff5ea;
    }

    .pick-sub{
      margin-top:8px;
      font-size:11px;
      letter-spacing:.20em;
      text-transform:uppercase;
      color:rgba(255,255,255,.68);
    }

    .hero-menu{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      z-index:3;
      display:grid;
      gap:4px;
      padding-bottom:8px;
      background:linear-gradient(180deg, transparent, rgba(0,0,0,.76) 24%, rgba(0,0,0,.96) 100%);
    }

    .strip{
      width:100%;
      height:var(--strip-h);
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      padding:0 var(--side);
      background:#030303;
      border-top:1px solid var(--line);
      border-bottom:1px solid var(--line);
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(15px,1.4vw,22px);
      color:#fff8ef;
      text-align:left;
    }

    .strip .arrow{
      font-size:19px;
      line-height:1;
    }

    .overlay{
      position:fixed;
      inset:0;
      z-index:9999;
      background:rgba(0,0,0,.86);
      opacity:0;
      pointer-events:none;
      transition:opacity .28s ease;
    }

    .overlay.active{
      opacity:1;
      pointer-events:auto;
    }

    .panel{
      position:absolute;
      inset:0;
      background:#000;
      transform:translateY(100%);
      transition:transform .34s ease;
      display:flex;
      flex-direction:column;
    }

    .overlay.active .panel{
      transform:translateY(0);
    }

    .floating-top,
    .floating-bottom{
      display:grid;
      gap:4px;
      background:rgba(0,0,0,.98);
    }

    .floating-top{
      position:sticky;
      top:0;
      z-index:10;
    }

    .home-back{
      width:100%;
      height:38px;
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:10px;
      padding:0 var(--side);
      background:#050505;
      border-top:1px solid var(--line);
      border-bottom:1px solid var(--line);
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(15px,1.4vw,22px);
      color:#fff8ef;
      text-align:left;
    }

    .mini-note{
      margin-top:2px;
      font-size:10px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:rgba(255,255,255,.58);
    }

    .mini-strip{
      width:100%;
      height:32px;
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      padding:0 var(--side);
      background:#030303;
      border-top:1px solid rgba(255,255,255,.08);
      border-bottom:1px solid rgba(255,255,255,.08);
      font-size:13px;
      color:#f8efe6;
      text-align:left;
    }

    .panel-scroll{
      flex:1;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      background:#000;
    }

    .detail{
      min-height:calc(100svh - 70px);
      display:grid;
      grid-template-columns:1fr 1fr;
      background:#000;
    }

    .detail-image{
      min-height:420px;
      background:
        linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.48)),
        var(--detail-image) center 28% / cover no-repeat;
    }

    .detail-info{
      padding:24px var(--side) 18px;
      background:linear-gradient(180deg, rgba(0,0,0,.78), rgba(0,0,0,.94));
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
    }

    .detail-title{
      margin:0 0 12px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(34px,4.2vw,66px);
      line-height:.94;
      font-weight:500;
      color:#fff8ef;
    }

    .detail-text{
      margin:0;
      font-size:clamp(15px,1.25vw,20px);
      line-height:1.6;
      color:var(--muted);
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:18px 0 16px;
    }

    .chip{
      padding:8px 13px;
      border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.10);
      color:#f5ecdf;
      font-size:13px;
    }

    .ba{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:4px;
    }

    .ba-card{
      overflow:hidden;
      background:#0b0b0b;
      border:1px solid rgba(255,255,255,.10);
    }

    .ba-lab{
      padding:10px 8px;
      text-align:center;
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      background:#000;
      color:#f6ecdf;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .ba-card img{
      width:100%;
      height:200px;
      object-fit:cover;
      display:block;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:18px;
    }

    .btn{
      min-height:48px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      font-size:16px;
      font-weight:800;
      border:1px solid rgba(255,255,255,.14);
    }

    .btn.light{
      background:transparent;
      color:#fff;
    }

    .btn.gold{
      background:var(--cream);
      color:#111;
      border-color:transparent;
    }

    @media (max-width:900px){
      .hero{
        background-position:center 20%;
      }

      .hero-center{
        padding:120px 18px 210px;
      }

      .detail{
        grid-template-columns:1fr;
      }

      .detail-image{
        min-height:280px;
        background-position:center 18%;
      }

      .ba-card img{
        height:145px;
      }
    }
  </style>
</head>
<body>
  <section class="home" id="home">
    <div class="topline">
      <a href="https://wa.me/17866900960?text=Hola%20quiero%20información%20sobre%20el%20tratamiento" target="_blank" rel="noopener">☎ 786 690 0960</a>
      <a href="mailto:droyalspamiami@gmail.com">✉ droyalspamiami@gmail.com</a>
    </div>

    <div class="hero-center">
      <h2 class="brand" id="brand"></h2>
      <h1 class="headline" id="headline"></h1>
      <div class="areas" id="areas"></div>

      <div class="phone-wrap">
        <a class="phone" href="https://wa.me/17866900960?text=Hola%20quiero%20información%20sobre%20el%20tratamiento" target="_blank" rel="noopener">786 690 0960</a>
      </div>

      <div class="email">droyalspamiami@gmail.com</div>

      <div class="offer">
        <b>25% OFF</b>
        <span id="offerText"></span>
      </div>

      <div class="pick" id="pick"></div>
      <div class="pick-sub" id="pickSub"></div>
    </div>

    <div class="hero-menu" id="heroMenu"></div>
  </section>

  <div class="overlay" id="overlay">
    <div class="panel" id="panel"></div>
  </div>

  <script>
    const isSpanish = (navigator.language || '').toLowerCase().startsWith('es');

    const T = {
      brand: "D’ROYAL SPA",
      headline: isSpanish ? "Lipo sin cirugía" : "Surgery-Free Lipo",
      areas: "Brickell · Downtown · Doral · Miami Beach",
      offer: isSpanish ? "Primera sesión limitada" : "Limited first session",
      pick: isSpanish ? "Selecciona tu tratamiento" : "Choose your treatment",
      pickSub: isSpanish ? "Resultados reales · Tecnología avanzada" : "Real results · Advanced technology",
      home: isSpanish ? "Lipo sin cirugía" : "Surgery-Free Lipo",
      homeMini: isSpanish ? "Inicio" : "Home",
      before: isSpanish ? "Antes" : "Before",
      after: isSpanish ? "Después" : "After",
      learn: isSpanish ? "Aprender más" : "Learn more",
      book: isSpanish ? "Agendar cita" : "Book now"
    };

    document.getElementById('brand').textContent = T.brand;
    document.getElementById('headline').textContent = T.headline;
    document.getElementById('areas').textContent = T.areas;
    document.getElementById('offerText').textContent = T.offer;
    document.getElementById('pick').textContent = T.pick;
    document.getElementById('pickSub').textContent = T.pickSub;

    const treatments = [
      {
        nameEs:'Lipo con Láser 360',
        nameEn:'Lipo Laser 360',
        summaryEs:'Moldea y ayuda a reducir grasa localizada para estilizar la silueta desde la primera sesión.',
        summaryEn:'Contours the body and helps reduce localized fat to refine your shape from the first session.',
        chipsEs:['Abdomen','Cintura','Espalda','Definición corporal'],
        chipsEn:['Abdomen','Waist','Back','Body definition'],
        before:'https://images.squarespace-cdn.com/content/v1/65e0b0203d824e56691e609a/e4f9e519-3587-4a6b-a7cc-54c79374a264/Your%2Bparagraph%2Btext-37.jpg',
        after:'https://images.squarespace-cdn.com/content/v1/65e0b0203d824e56691e609a/ca6213db-91b4-4e1d-bba9-667ec1c10175/Untitled%2Bdesign-16.jpg',
        image:'./modelo.jpg',
        learn:'https://droyalspa.com/lipo-con-laser',
        book:'https://DRoyalSpaMiami.as.me/?appointmentType=91559773'
      },
      {
        nameEs:'Lipo con Láser 360 con transfer',
        nameEn:'Lipo Laser 360 with transfer',
        summaryEs:'Combina reducción localizada y transferencia para crear un contorno más armónico y llamativo.',
        summaryEn:'Combines targeted reduction and transfer to create a fuller, more balanced contour.',
        chipsEs:['Moldeo','Curvas','Contorno','Figura armónica'],
        chipsEn:['Sculpting','Curves','Contour','Balanced shape'],
        before:'https://images.squarespace-cdn.com/content/v1/65e0b0203d824e56691e609a/e4f9e519-3587-4a6b-a7cc-54c79374a264/Your%2Bparagraph%2Btext-37.jpg',
        after:'https://images.squarespace-cdn.com/content/v1/65e0b0203d824e56691e609a/ca6213db-91b4-4e1d-bba9-667ec1c10175/Untitled%2Bdesign-16.jpg',
        image:'./modelo.jpg',
        learn:'https://droyalspa.com/lipo-laser-con-transfer',
        book:'https://DRoyalSpaMiami.as.me/?appointmentType=91559810'
      },
      {
        nameEs:'LipoPapada con Láser 360',
        nameEn:'Double Chin Laser Lipo 360',
        summaryEs:'Define el perfil del rostro y ayuda a estilizar la zona de la papada para un look más limpio.',
        summaryEn:'Defines the jawline and helps refine the double chin area for a cleaner facial profile.',
        chipsEs:['Papada','Perfil','Mandíbula','Definición facial'],
        chipsEn:['Double chin','Profile','Jawline','Facial definition'],
        before:'https://images.squarespace-cdn.com/content/v1/65e0b0203d824e56691e609a/1ea03fe7-ad2f-4796-aeb1-2179eb09fb60/112.jpg',
        after:'https://images.squarespace-cdn.com/content/v1/65e0b0203d824e56691e609a/ec28aa8a-30c9-41f5-ab4e-d369944b68b8/106.jpg',
        image:'./modelo.jpg',
        learn:'https://droyalspa.com/lipo-papada',
        book:'https://DRoyalSpaMiami.as.me/?appointmentType=91560745'
      },
      {
        nameEs:'D-Cool',
        nameEn:'D-Cool',
        summaryEs:'Tratamiento facial con limpieza, aloe y radiofrecuencia para una piel más firme, luminosa y renovada.',
        summaryEn:'Facial treatment with cleansing, aloe, and radiofrequency for firmer, brighter, refreshed skin.',
        chipsEs:['Glow','Firmeza','Limpieza','Lifting facial'],
        chipsEn:['Glow','Firmness','Cleansing','Facial lifting'],
        before:'./modelo.jpg',
        after:'./modelo.jpg',
        image:'./modelo.jpg',
        learn:'https://droyalspa.com/d-cool-regeneracion-con-celulas-madre',
        book:'https://DRoyalSpaMiami.as.me/?appointmentType=91560920'
      },
      {
        nameEs:'Aumento de Senos sin cirugía',
        nameEn:'Non-surgical Breast Enhancement',
        summaryEs:'Ayuda a mejorar proyección, forma y apariencia para un escote más armónico sin cirugía.',
        summaryEn:'Helps improve projection and shape for a fuller, more balanced look without surgery.',
        chipsEs:['Forma','Proyección','Escote','Volumen visual'],
        chipsEn:['Shape','Projection','Cleavage','Visual fullness'],
        before:'./modelo.jpg',
        after:'./modelo.jpg',
        image:'./modelo.jpg',
        learn:'https://droyalspa.com/new-page',
        book:'https://DRoyalSpaMiami.as.me/?appointmentType=91560087'
      },
      {
        nameEs:'Aumento de Glúteos sin cirugía',
        nameEn:'Non-surgical Butt Enhancement',
        summaryEs:'Trabaja proyección y contorno para resaltar la figura con una apariencia más redonda y definida.',
        summaryEn:'Enhances projection and contour for a fuller, more sculpted look.',
        chipsEs:['Proyección','Contorno','Curvas','Figura'],
        chipsEn:['Projection','Contour','Curves','Figure'],
        before:'./modelo.jpg',
        after:'./modelo.jpg',
        image:'./modelo.jpg',
        learn:'https://droyalspa.com/piernas',
        book:'https://DRoyalSpaMiami.as.me/?appointmentType=91560697'
      },
      {
        nameEs:'LipoEscultura de brazos 360',
        nameEn:'Arm Sculpting 360',
        summaryEs:'Ayuda a reducir volumen y mejorar definición en brazos para un look más limpio y estilizado.',
        summaryEn:'Helps reduce bulk and improve arm definition for a slimmer, more refined look.',
        chipsEs:['Brazos','Definición','Firmeza','Moldeo'],
        chipsEn:['Arms','Definition','Firmness','Sculpting'],
        before:'./modelo.jpg',
        after:'./modelo.jpg',
        image:'./modelo.jpg',
        learn:'https://droyalspa.com/reduccion-de-brazos',
        book:'https://DRoyalSpaMiami.as.me/?appointmentType=91873037'
      },
      {
        nameEs:'LipoEscultura de piernas 360',
        nameEn:'Leg Sculpting 360',
        summaryEs:'Ayuda a estilizar piernas y mejorar su apariencia general para una silueta más lisa y definida.',
        summaryEn:'Helps refine the legs for a smoother, more sculpted silhouette.',
        chipsEs:['Piernas','Celulitis','Liso visual','Definición'],
        chipsEn:['Legs','Cellulite','Smoother look','Definition'],
        before:'./modelo.jpg',
        after:'./modelo.jpg',
        image:'./modelo.jpg',
        learn:'https://droyalspa.com/1-reduccion-de-celulitis-en-piernas',
        book:'https://DRoyalSpaMiami.as.me/?appointmentType=91873056'
      }
    ];

    const heroMenu = document.getElementById('heroMenu');
    const overlay = document.getElementById('overlay');
    const panel = document.getElementById('panel');

    const getName = t => isSpanish ? t.nameEs : t.nameEn;
    const getSummary = t => isSpanish ? t.summaryEs : t.summaryEn;
    const getChips = t => isSpanish ? t.chipsEs : t.chipsEn;

    heroMenu.innerHTML = treatments.map((t,i) => `
      <button class="strip" data-open="${i}">
        <span>${getName(t)}</span>
        <span class="arrow">›</span>
      </button>
    `).join('');

    function mini(i){
      const t = treatments[i];
      if(!t) return '';
      return `
        <button class="mini-strip" data-open="${i}">
          <span>${getName(t)}</span>
          <span>›</span>
        </button>
      `;
    }

    function renderPanel(i){
      const t = treatments[i];

      panel.innerHTML = `
        <div class="floating-top">
          <button class="home-back" id="closePanel">
            <span>‹</span>
            <span>${T.home}<div class="mini-note">${T.homeMini}</div></span>
            <span></span>
          </button>
          ${i > 0 ? mini(i-1) : ''}
        </div>

        <div class="panel-scroll">
          <section class="detail">
            <div class="detail-image" style="--detail-image:url('${t.image}')"></div>

            <div class="detail-info">
              <h2 class="detail-title">${getName(t)}</h2>
              <p class="detail-text">${getSummary(t)}</p>

              <div class="chips">
                ${getChips(t).map(c => `<span class="chip">${c}</span>`).join('')}
              </div>

              <div class="ba">
                <div class="ba-card">
                  <div class="ba-lab">${T.before}</div>
                  <img src="${t.before}" alt="${T.before}">
                </div>
                <div class="ba-card">
                  <div class="ba-lab">${T.after}</div>
                  <img src="${t.after}" alt="${T.after}">
                </div>
              </div>

              <div class="actions">
                <a class="btn light" href="${t.learn}" target="_blank" rel="noopener">${T.learn}</a>
                <a class="btn gold" href="${t.book}" target="_blank" rel="noopener">${T.book}</a>
              </div>
            </div>
          </section>
        </div>

        <div class="floating-bottom">
          ${mini(i+1)}
          ${mini(i+2)}
        </div>
      `;

      panel.querySelector('#closePanel').addEventListener('click', closePanel);
      panel.querySelectorAll('[data-open]').forEach(btn => {
        btn.addEventListener('click', () => openPanel(Number(btn.dataset.open)));
      });
    }

    function openPanel(i){
      renderPanel(i);
      overlay.classList.add('active');
      document.body.classList.add('overlay-open');
    }

    function closePanel(){
      overlay.classList.remove('active');
      document.body.classList.remove('overlay-open');
    }

    document.querySelectorAll('[data-open]').forEach(btn => {
      btn.addEventListener('click', () => openPanel(Number(btn.dataset.open)));
    });

    overlay.addEventListener('click', (e) => {
      if(e.target === overlay) closePanel();
    });
  </script>
</body>
</html>

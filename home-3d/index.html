<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D'Royal Spa Test</title>
<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
}

.wrap{
max-width:1400px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
margin-bottom:50px;
}

.video-box{
border-radius:24px;
overflow:hidden;
background:#111;
min-height:600px;
}

.video-box video{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.result-box{
border-radius:24px;
overflow:hidden;
background:#111;
}

.result-box img{
width:100%;
height:600px;
object-fit:cover;
display:block;
}

h1{
margin:0 0 25px;
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
.video-box,
.result-box img{
height:420px;
min-height:auto;
}
}
</style>
</head>
<body>

<div class="wrap">

<h1>TEST VIDEOS + FOTOS</h1>

<div class="grid">
<div class="video-box">
<video autoplay muted loop playsinline>
<source src="./lipo/main.mp4" type="video/mp4">
</video>
</div>
<div class="result-box">
<img src="./lipo/lipo1.jpg" alt="">
</div>
</div>

<div class="grid">
<div class="video-box">
<video autoplay muted loop playsinline>
<source src="./papada/main.mp4" type="video/mp4">
</video>
</div>
<div class="result-box">
<img src="./papada/chin1.jpg" alt="">
</div>
</div>

<div class="grid">
<div class="video-box">
<video autoplay muted loop playsinline>
<source src="./brazos/main.mp4" type="video/mp4">
</video>
</div>
<div class="result-box">
<img src="./brazos/arm1.jpg" alt="">
</div>
</div>

</div>

</body>
</html>

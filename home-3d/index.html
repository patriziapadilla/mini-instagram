<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D’Royal Spa · Home 3D</title>
  <style>
    :root{
      --bg:#050505;
      --panel:#0b0b0b;
      --line:rgba(255,255,255,.10);
      --gold:#dcc2a2;
      --cream:#efe2d4;
      --text:#f8efe7;
      --muted:rgba(248,239,231,.78);
      --shadow:0 24px 70px rgba(0,0,0,.34);
      --whatsapp:#25D366;
      --danger:#ffefe3;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:#000;
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
      overflow:hidden;
    }

    a{color:inherit;text-decoration:none}
    button,input,select{font:inherit}
    button{
      border:none;
      background:none;
      color:inherit;
      cursor:pointer;
    }

    .app{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#000;
      position:relative;
      -webkit-overflow-scrolling:touch;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:50;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      padding:14px 16px;
      background:linear-gradient(180deg, rgba(0,0,0,.65), rgba(0,0,0,.08));
      pointer-events:none;
    }

    .topbar > *{pointer-events:auto}
    .topbar-center{text-align:center;flex:1;min-width:0}

    .brand{
      margin:0;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(22px,2.6vw,34px);
      font-weight:500;
      color:var(--gold);
      letter-spacing:.02em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .deck{
      height:100vh;
      display:flex;
      overflow-x:auto;
      overflow-y:hidden;
      scroll-snap-type:x mandatory;
      scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
    }

    .deck::-webkit-scrollbar{display:none}

    .slide{
      flex:0 0 100vw;
      width:100vw;
      height:100vh;
      scroll-snap-align:start;
      position:relative;
      overflow:hidden;
      background:#000;
    }

    .slide-inner{
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      opacity:.55;
      transform:scale(.94);
      transition:opacity .45s ease, transform .45s ease;
    }

    .slide.active .slide-inner{opacity:1;transform:scale(1)}

    .home-video-wrap{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
    }

    .home-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:0;
      background:#000;
    }

    .home-overlay{
      position:absolute;
      inset:0;
      z-index:1;
      background:linear-gradient(180deg, rgba(0,0,0,.18) 0%, rgba(0,0,0,.32) 32%, rgba(0,0,0,.70) 76%, rgba(0,0,0,.95) 100%);
    }

    .home-center{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:56px 20px 148px;
      position:relative;
      z-index:2;
    }

    .headline{
      margin:0;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(44px,6.2vw,82px);
      line-height:.92;
      font-weight:500;
      color:#fff9f1;
      max-width:920px;
    }

    .review-link{
      margin-top:10px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:7px 14px;
      border-radius:999px;
      background:rgba(0,0,0,.32);
      border:1px solid rgba(255,255,255,.10);
      color:#f3ddba;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(15px,1.15vw,20px);
      line-height:1;
    }

    .review-stars{letter-spacing:.06em;font-size:1em}

    .home-tagline{
      margin-top:10px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(18px,1.8vw,30px);
      color:#fff6eb;
    }

    .areas{
      margin-top:8px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(16px,1.8vw,25px);
      color:#f3e7d8;
    }

    .offer{
      margin-top:10px;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(10,10,10,.34);
      font-size:14px;
    }

    .offer b{
      padding:7px 12px;
      border-radius:999px;
      background:rgba(220,194,162,.18);
      color:#fff4e8;
    }

    .primary-book,
    .secondary-cta,
    .results-btn{margin-top:12px;display:flex;align-items:center;gap:14px;max-width:620px;width:min(90vw,620px);padding:12px 18px;border-radius:24px;background:rgba(8,8,8,.58);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(8px);color:#f6ead7;text-align:left;box-shadow:0 18px 40px rgba(0,0,0,.32)}
    .results-thumb{width:56px;height:56px;border-radius:16px;background:url('./lipo-results.jpg') center/cover no-repeat;flex:0 0 56px}
    .results-copy{display:flex;flex-direction:column;line-height:1.15}
    .results-copy strong{font-size:28px;font-family:Georgia,"Times New Roman",serif;font-weight:700}
    .results-copy small{font-size:14px;opacity:.82;margin-top:4px}
    .results-arrow{margin-left:auto;font-size:44px;line-height:1;color:#d8b15c}
    .phone-link{
      margin-top:9px;
      gap:8px;
      padding:9px 18px;
      background:rgba(0,0,0,.48);
      border:1px solid rgba(255,255,255,.14);
      color:#fff8ef;
      font-size:clamp(16px,1.3vw,23px);
      font-weight:700;
    }}

    .phone-icon{font-size:1em;line-height:1}

    .treatments-label{
      margin-top:14px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(18px,1.7vw,30px);
      color:#fff2df;
    }

    .home-tools{
      margin-top:18px;
      width:min(900px, 94vw);
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      position:relative;
      z-index:2;
    }

    .tool-card{
      padding:14px 14px 16px;
      border-radius:22px;
      background:rgba(6,6,6,.58);
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter:blur(6px);
      box-shadow:var(--shadow);
      text-align:left;
    }

    .tool-card h3{
      margin:0 0 8px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:18px;
      color:#fff8ef;
      font-weight:500;
    }

    .tool-card p{
      margin:0 0 12px;
      font-size:14px;
      line-height:1.45;
      color:var(--muted);
    }

    .tool-card button,
    .tool-card a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.05);
      color:#fff8ef;
      font-weight:700;
      width:100%;
    }

    .home-rail{
      position:absolute;
      left:0;
      right:0;
      bottom:38px;
      z-index:3;
      display:grid;
      gap:1px;
      padding:0 0 4px;
      background:linear-gradient(180deg, transparent, rgba(0,0,0,.76) 24%, rgba(0,0,0,.97) 100%);
    }

    .rail-btn,
    .mini-rail-btn{
      width:100%;
      text-align:left;
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      padding:0 14px;
      background:#030303;
      border-top:1px solid var(--line);
      border-bottom:1px solid var(--line);
      border-left:none;
      border-right:none;
      border-radius:0;
      font-family:Georgia,"Times New Roman",serif;
      color:#fff8ef;
      margin:0;
      min-width:0;
    }

    .rail-btn{height:26px;font-size:clamp(12px,0.96vw,16px);line-height:1}
    .mini-rail-btn{height:26px;font-size:12px;line-height:1}

    .treatment{
      background:radial-gradient(circle at top left, rgba(255,255,255,.04), transparent 24%),linear-gradient(180deg, #080808 0%, #000 100%);
    }

    .treatment-wrap{
      width:100%;
      height:100%;
      padding:88px 16px 72px;
      display:grid;
      grid-template-columns:1.04fr .96fr;
      gap:18px;
      align-items:stretch;
    }

    .l360-stack{
      grid-template-columns:1fr;
      align-items:start;
      height:auto;
      min-height:100%;
    }

    .l360-stack .media-pane{
      min-height:420px;
      max-height:72vh;
    }

    @media (min-width: 921px){
      .treatment-wrap.l360-stack .media-stage video,
      .treatment-wrap.l360-stack .media-stage img{
        object-position:center center;
      }
    }


    .media-pane{
      position:relative;
      border-radius:28px;
      overflow:hidden;
      background:#111;
      box-shadow:var(--shadow);
      min-height:0;
    }

    .media-stage{
      width:100%;
      height:100%;
      position:relative;
      background:#0e0e0e;
    }

    .media-stage video,
    .media-stage img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#111;
    }

    .fallback-image{display:none}
    .fallback-image.show{display:block}
    .hidden-video{display:none}
    .info-pane{display:flex;flex-direction:column;min-height:0}

    .page-card{
      flex:1;
      min-height:0;
      height:100%;
      max-height:100%;
      border-radius:28px;
      overflow-y:auto;
      overflow-x:hidden;
      overscroll-behavior:contain;
      -webkit-overflow-scrolling:touch;
      touch-action:pan-y;
      scrollbar-width:thin;
      scrollbar-color:rgba(220,194,162,.55) rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.00));
      border:1px solid rgba(255,255,255,.06);
      box-shadow:var(--shadow);
      position:relative;
    }

    .page-card::-webkit-scrollbar{width:8px}
    .page-card::-webkit-scrollbar-track{background:rgba(255,255,255,.06);border-radius:999px}
    .page-card::-webkit-scrollbar-thumb{background:rgba(220,194,162,.58);border-radius:999px}

    .page-card-inner{padding:24px 18px 18px}

    .floating-home{
      position:sticky;
      top:10px;
      z-index:12;
      display:flex;
      justify-content:flex-start;
      margin-bottom:14px;
      pointer-events:none;
    }

    .floating-home .home-link{
      pointer-events:auto;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(0,0,0,.72);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 10px 24px rgba(0,0,0,.28);
      color:#fff8ef;
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      backdrop-filter:blur(6px);
    }

    .page-topline{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:10px;
      margin-bottom:12px;
      color:rgba(255,255,255,.82);
    }

    .page-title{
      margin:0 0 12px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(34px,4vw,62px);
      line-height:.94;
      font-weight:500;
      color:#fff8ef;
    }

    .page-text{
      margin:0;
      font-size:clamp(15px,1.12vw,18px);
      line-height:1.55;
      color:var(--muted);
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:18px 0 16px;
    }

    .chip{
      padding:8px 13px;
      border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.10);
      color:#f5ecdf;
      font-size:13px;
      line-height:1;
    }

    .quick-tools{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin:12px 0 14px;
    }

    .quick-tools button{
      min-height:44px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      color:#fff8ef;
      font-weight:700;
    }

    .package-box{
      margin:10px 0 16px;
      padding:14px;
      border-radius:20px;
      background:#0b0b0b;
      border:1px solid rgba(255,255,255,.10);
    }

    .package-box h4{
      margin:0 0 10px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:20px;
      font-weight:500;
      color:#fff8ef;
    }

    .calc-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .calc-grid select,
    .calc-grid input{
      width:100%;
      min-height:44px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:#050505;
      color:#fff8ef;
      padding:0 12px;
    }

    .calc-result{
      margin-top:12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 14px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
    }

    .calc-price{
      font-size:24px;
      font-weight:800;
      color:#fff4e8;
    }

    .result-card{
      overflow:hidden;
      background:#0b0b0b;
      border:1px solid rgba(255,255,255,.10);
      border-radius:20px;
      margin-top:4px;
    }

    .result-lab{
      padding:10px 8px;
      text-align:center;
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      background:#000;
      color:#f6ecdf;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .result-card img{
      width:100%;
      height:240px;
      object-fit:cover;
      display:block;
      background:#111;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:18px;
    }

    .btn{
      min-height:48px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      font-size:16px;
      font-weight:800;
      border:1px solid rgba(255,255,255,.14);
      padding:0 14px;
      text-align:center;
    }

    .btn.light{background:transparent;color:#fff}
    .btn.gold{background:var(--cream);color:#111;border-color:transparent}

    .results-note{
      margin-top:10px;
      text-align:center;
      font-size:11px;
      letter-spacing:.04em;
      color:rgba(255,255,255,.62);
    }

    .bottom-nav{margin-top:12px;display:grid;gap:4px}

    .whatsapp-float,
    .quote-float{
      position:fixed;
      right:16px;
      width:56px;
      height:56px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 16px 36px rgba(0,0,0,.35);
      font-size:24px;
      z-index:60;
    }

    .whatsapp-float{
      bottom:16px;
      background:var(--whatsapp);
      color:#fff;
    }

    .quote-float{
      bottom:82px;
      background:#f3dfc4;
      color:#111;
      border:none;
      font-weight:900;
      font-size:22px;
    }

    .sticky-book{
      display:none !important;
    }

    .modal{
      position:fixed;
      inset:0;
      z-index:120;
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      background:rgba(0,0,0,.72);
      backdrop-filter:blur(6px);
    }

    .modal.open{display:flex}

    .modal-card{
      width:min(560px, 100%);
      max-height:90vh;
      overflow:auto;
      background:#090909;
      border:1px solid rgba(255,255,255,.12);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .modal-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    .modal-title{
      margin:0;
      font-family:Georgia,"Times New Roman",serif;
      font-size:30px;
      font-weight:500;
      color:#fff8ef;
    }

    .close-btn{
      width:40px;
      height:40px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      color:#fff8ef;
      font-size:20px;
    }

    .modal-text{
      margin:0 0 16px;
      color:var(--muted);
      line-height:1.5;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .field{display:grid;gap:7px}
    .field.full{grid-column:1 / -1}
    .field label{font-size:13px;color:#f0e0ca}

    .field input,
    .field select,
    .field textarea{
      width:100%;
      min-height:46px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:#040404;
      color:#fff8ef;
      padding:0 12px;
    }

    .field textarea{
      min-height:100px;
      padding:12px;
      resize:vertical;
    }

    .inline-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:16px;
    }

    .primary-modal-btn,
    .secondary-modal-btn{
      min-height:48px;
      border-radius:999px;
      font-weight:900;
      padding:0 14px;
    }

    .primary-modal-btn{
      background:linear-gradient(180deg, #e6c98f 0%, #c99d46 100%);
      color:#111;
    }

    .secondary-modal-btn{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.12);
      color:#fff8ef;
    }



    .l360-hero-overlay{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      padding:24px;
      background:linear-gradient(180deg, rgba(0,0,0,.08) 0%, rgba(0,0,0,.18) 32%, rgba(0,0,0,.78) 100%);
      z-index:2;
      pointer-events:none;
    }

    .l360-kicker{
      display:inline-flex;
      width:max-content;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(0,0,0,.42);
      border:1px solid rgba(255,255,255,.14);
      color:#f3dfc4;
      font-size:11px;
      letter-spacing:.14em;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    .l360-hero-title{
      margin:0;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(34px,4.2vw,64px);
      line-height:.92;
      color:#fff8ef;
      text-shadow:0 10px 28px rgba(0,0,0,.36);
    }

    .l360-hero-sub{
      margin-top:10px;
      max-width:620px;
      color:rgba(255,248,239,.82);
      font-size:15px;
      line-height:1.5;
    }


    .treatment-wrap.l360-stack{
      grid-template-columns:1fr;
      gap:16px;
      padding:88px 24px 24px;
      align-content:start;
    }

    .treatment-wrap.l360-stack .media-pane{
      width:100%;
      height:52vh;
      min-height:340px;
      border-radius:30px;
    }

    .treatment-wrap.l360-stack .page-card{
      height:calc(100vh - 52vh - 150px);
      min-height:280px;
      overflow:auto;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
    }

    .treatment-wrap.l360-stack .page-card-inner{
      padding:20px 18px 26px;
    }

    .treatment-wrap.l360-stack .info-pane{
      min-height:0;
    }


    .l360-top-actions,
    .l360-bottom-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin:16px 0 18px;
    }

    .l360-ghost-btn,
    .l360-gold-btn,
    .l360-package-btn{
      min-height:48px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      font-size:15px;
      font-weight:900;
      text-align:center;
      padding:0 16px;
    }

    .l360-ghost-btn{
      color:#fff8ef;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.04);
    }

    .l360-gold-btn,
    .l360-package-btn{
      color:#111;
      background:linear-gradient(180deg,#e6c98f 0%,#c99d46 100%);
      border:1px solid transparent;
    }

    .l360-summary-box,
    .l360-section,
    .l360-pricing-wrap,
    .l360-faq,
    .l360-gallery-wrap{
      margin-top:16px;
      padding:18px;
      border-radius:22px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
    }

    .l360-section-title{
      margin:0 0 12px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:28px;
      color:#fff8ef;
      font-weight:500;
    }

    .l360-summary-box p,
    .l360-faq details p,
    .l360-note,
    .l360-price-note{

        const canScroll = card.scrollHeight > card.clientHeight;
        if (!canScroll) return;

        const goingDown = e.deltaY > 0;
        const goingUp = e.deltaY < 0;
        const atTop = card.scrollTop <= 0;
        const atBottom = Math.ceil(card.scrollTop + card.clientHeight) >= card.scrollHeight;

        if ((goingDown && !atBottom) || (goingUp && !atTop)) {
          e.preventDefault();
          e.stopPropagation();
          card.scrollTop += e.deltaY;
        }
      }, { passive:false });
    });

    deck.addEventListener('wheel', (e) => {

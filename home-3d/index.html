<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tratamientos</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

.section{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

h2{
  margin-bottom:20px;
}

.card{
  width:300px;
  height:400px;
  perspective:1000px;
}

.inner{
  width:100%;
  height:100%;
  transition:0.6s;
  transform-style:preserve-3d;
}

.card:hover .inner{
  transform:rotateY(180deg);
}

.front,.back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:15px;
  overflow:hidden;
}

.back{
  transform:rotateY(180deg);
}

img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TELEFONO CENTRADO ABAJO */
.whatsapp{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#25D366;
  color:#fff;
  padding:12px 20px;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="section">
  <h2>Brazos</h2>
  <div class="card">
    <div class="inner">
      <div class="front">
        <img src="brazos/brazos.jpg">
      </div>
      <div class="back">
        <img src="brazos/brazos2.jpg">
      </div>
    </div>
  </div>
</div>

<div class="section">
  <h2>Glúteos</h2>
  <div class="card">
    <div class="inner">
      <div class="front">
        <img src="gluteos/gluteos1.jpg">
      </div>
      <div class="back">
        <img src="gluteos/gluteos2.jpg">
      </div>
    </div>
  </div>
</div>

<div class="section">
  <h2>Lipo 360</h2>
  <div class="card">
    <div class="inner">
      <div class="front">
        <img src="lipo/lipo1.jpg">
      </div>
      <div class="back">
        <img src="lipo/lipo2.jpg">
      </div>
    </div>
  </div>
</div>

<!-- WHATSAPP CENTRADO ABAJO -->
<a class="whatsapp" href="https://wa.me/1234567890">
WhatsApp
</a>

</body>
</html>

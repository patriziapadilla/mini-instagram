<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Scroll Treatments</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
  overflow-x: hidden;
}

.section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.card {
  width: 320px;
  height: 420px;
  perspective: 1000px;
}

.inner {
  width: 100%;
  height: 100%;
  transition: transform 0.6s;
  transform-style: preserve-3d;
}

.card:hover .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 20px;
  overflow: hidden;
}

.front img, .back img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.back {
  transform: rotateY(180deg);
}

h2 {
  position: absolute;
  top: 40px;
  font-size: 26px;
}
</style>
</head>

<body>

<!-- BRAZOS -->
<div class="section">
  <h2>Brazos</h2>
  <div class="card">
    <div class="inner">
      <div class="front">
        <img src="brazos/Your paragraph text-38.jpg">
      </div>
      <div class="back">
        <img src="brazos/Your paragraph text-38.jpg">
      </div>
    </div>
  </div>
</div>

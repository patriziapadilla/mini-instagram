<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D’Royal Spa · Home 3D</title>
  <style>
    :root{
      --bg:#050505;
      --panel:#0b0b0b;
      --line:rgba(255,255,255,.10);
      --gold:#dcc2a2;
      --cream:#efe2d4;
      --text:#f8efe7;
      --muted:rgba(248,239,231,.78);
      --shadow:0 24px 70px rgba(0,0,0,.34);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:#000;
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
      overflow:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button{
      font:inherit;
      border:none;
      background:none;
      color:inherit;
      cursor:pointer;
    }

    .app{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#000;
      position:relative;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:50;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      padding:14px 16px;
      background:linear-gradient(180deg, rgba(0,0,0,.65), rgba(0,0,0,.08));
      pointer-events:none;
    }

    .topbar > *{
      pointer-events:auto;
    }

    .topbar-center{
      text-align:center;
      flex:1;
      min-width:0;
    }

    .brand{
      margin:0;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(22px,2.6vw,34px);
      font-weight:500;
      color:var(--gold);
      letter-spacing:.02em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .deck{
      height:100vh;
      display:flex;
      overflow-x:auto;
      overflow-y:hidden;
      scroll-snap-type:x mandatory;
      scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
    }

    .deck::-webkit-scrollbar{
      display:none;
    }

    .slide{
      flex:0 0 100vw;
      width:100vw;
      height:100vh;
      scroll-snap-align:start;
      position:relative;
      overflow:hidden;
      background:#000;
    }

    .slide-inner{
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      opacity:.55;
      transform:scale(.94);
      transition:opacity .45s ease, transform .45s ease;
    }

    .slide.active .slide-inner{
      opacity:1;
      transform:scale(1);
    }

    .home-video-wrap{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
    }

    .home-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:0;
      background:#000;
    }

    .home-overlay{
      position:absolute;
      inset:0;
      z-index:1;
      background:linear-gradient(180deg, rgba(0,0,0,.20) 0%, rgba(0,0,0,.34) 34%, rgba(0,0,0,.72) 78%, rgba(0,0,0,.94) 100%);
    }

    .home-center{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:92px 20px 195px;
      position:relative;
      z-index:2;
    }

    .headline{
      margin:0;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(54px,8vw,104px);
      line-height:.92;
      font-weight:500;
      color:#fff9f1;
      max-width:1000px;
    }

    .areas{
      margin-top:18px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(18px,2vw,28px);
      color:#f3e7d8;
    }

    .offer{
      margin-top:16px;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(10,10,10,.34);
      font-size:14px;
    }

    .offer b{
      padding:8px 12px;
      border-radius:999px;
      background:rgba(220,194,162,.18);
      color:#fff4e8;
    }

    .home-tagline{
      margin-top:14px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(20px,2.4vw,34px);
      color:#fff6eb;
    }

    .offer-phone{
      margin-top:16px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 18px;
      border-radius:999px;
      background:rgba(0,0,0,.38);
      border:1px solid rgba(255,255,255,.14);
      color:#fff8ef;
      font-size:15px;
      font-weight:700;
    }

    .pick{
      display:none;
    }

    .pick-sub{
      display:none;
    }

    .home-rail{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      z-index:3;
      display:grid;
      gap:2px;
      padding:0 0 8px;
      background:linear-gradient(180deg, transparent, rgba(0,0,0,.76) 24%, rgba(0,0,0,.96) 100%);
    }

    .rail-btn,
    .mini-rail-btn{
      width:100%;
      text-align:left;
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      padding:0 14px;
      background:#030303;
      border-top:1px solid var(--line);
      border-bottom:1px solid var(--line);
      border-left:none;
      border-right:none;
      border-radius:0;
      font-family:Georgia,"Times New Roman",serif;
      color:#fff8ef;
      margin:0;
      min-width:0;
    }

    .rail-btn{
      height:30px;
      font-size:clamp(13px,1.05vw,18px);
      line-height:1;
    }

    .mini-rail-btn{
      height:28px;
      font-size:12px;
      line-height:1;
    }

    .treatment{
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.04), transparent 24%),
        linear-gradient(180deg, #080808 0%, #000 100%);
    }

    .treatment-wrap{
      width:100%;
      height:100%;
      padding:88px 16px 72px;
      display:grid;
      grid-template-columns:1.04fr .96fr;
      gap:18px;
      align-items:stretch;
    }

    .media-pane{
      position:relative;
      border-radius:28px;
      overflow:hidden;
      background:#111;
      box-shadow:var(--shadow);
      min-height:0;
    }

    .media-stage{
      width:100%;
      height:100%;
      position:relative;
      background:#0e0e0e;
    }

    .media-stage video,
    .media-stage img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#111;
    }

    .fallback-image{
      display:none;
    }

    .fallback-image.show{
      display:block;
    }

    .hidden-video{
      display:none;
    }

    .info-pane{
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .page-card{
      flex:1;
      min-height:0;
      border-radius:28px;
      overflow:auto;
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.00));
      border:1px solid rgba(255,255,255,.06);
      box-shadow:var(--shadow);
    }

    .page-card-inner{
      padding:24px 18px 18px;
    }

    .page-topline{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
      color:rgba(255,255,255,.82);
    }

    .home-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(255,255,255,.78);
    }

    .page-title{
      margin:0 0 12px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(34px,4vw,62px);
      line-height:.94;
      font-weight:500;
      color:#fff8ef;
    }

    .page-text{
      margin:0;
      font-size:clamp(15px,1.18vw,19px);
      line-height:1.6;
      color:var(--muted);
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:18px 0 16px;
    }

    .chip{
      padding:8px 13px;
      border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.10);
      color:#f5ecdf;
      font-size:13px;
    }

    .result-card{
      overflow:hidden;
      background:#0b0b0b;
      border:1px solid rgba(255,255,255,.10);
      border-radius:20px;
      margin-top:4px;
    }

    .result-lab{
      padding:10px 8px;
      text-align:center;
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      background:#000;
      color:#f6ecdf;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .result-card img{
      width:100%;
      height:240px;
      object-fit:cover;
      display:block;
      background:#111;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:18px;
    }

    .btn{
      min-height:48px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      font-size:16px;
      font-weight:800;
      border:1px solid rgba(255,255,255,.14);
      padding:0 14px;
      text-align:center;
    }

    .btn.light{
      background:transparent;
      color:#fff;
    }

    .btn.gold{
      background:var(--cream);
      color:#111;
      border-color:transparent;
    }

    .bottom-nav{
      margin-top:12px;
      display:grid;
      gap:4px;
    }

    .whatsapp-float{
      position:fixed;
      right:16px;
      bottom:16px;
      z-index:60;
      width:54px;
      height:54px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#25D366;
      color:#fff;
      box-shadow:0 16px 36px rgba(0,0,0,.35);
      font-size:26px;
    }

    .swipe-hint{
      display:none;
    }

    @media (max-width: 920px){
      .treatment-wrap{
        grid-template-columns:1fr;
        gap:12px;
        padding:82px 12px 72px;
      }

      .media-pane{
        height:38vh;
        min-height:300px;
      }

      .result-card img{
        height:170px;
      }

      .headline{
        font-size:clamp(46px,12vw,78px);
      }

      .home-center{
        padding:96px 18px 205px;
      }

      .actions{
        grid-template-columns:1fr;
      }

      .home-rail{
        gap:2px;
        padding:0 0 6px;
      }

      .rail-btn{
        height:28px;
        font-size:12px;
        padding:0 12px;
      }

      .mini-rail-btn{
        height:26px;
        font-size:11px;
        padding:0 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topbar-center">
        <h1 class="brand" id="brand"></h1>
      </div>
    </div>

    <main class="deck" id="deck"></main>

    <a class="whatsapp-float" href="https://wa.me/17866900960" target="_blank" rel="noopener" aria-label="WhatsApp">✆</a>
  </div>

  <script>
    const isSpanish = (navigator.language || '').toLowerCase().startsWith('es');

    const T = {
      brand: "D’ROYAL SPA",
      headline: isSpanish ? "Lipo sin cirugía" : "Surgery-Free Lipo",
      areas: "Brickell · Downtown · Doral · Miami Beach",
      offer: isSpanish ? "Primera sesión limitada" : "Limited first session",
      tagline: "In-Home Luxury Treatments",
      phoneLabel: "786-690-0960",
      pick: "",
      pickSub: "",
      home: isSpanish ? "Inicio" : "Home",
      results: isSpanish ? "Resultados Reales" : "Real Results",
      learn: isSpanish ? "Aprender más" : "Learn more",
      book: isSpanish ? "Agendar cita" : "Book now",
      swipe: ""
    };

    document.getElementById('brand').textContent = T.brand;

    const slides = [
      { type: "home" },
      {
        nameEs: "Lipo con Láser 360",
        nameEn: "Lipo Laser 360",
        textEs: "Ayuda a reducir grasa localizada y definir abdomen, cintura y espalda con una apariencia más estilizada.",
        textEn: "Helps reduce localized fat and define the abdomen, waist, and back for a more sculpted look.",
        chipsEs: ["Abdomen","Cintura","Espalda","Láser"],
        chipsEn: ["Abdomen","Waist","Back","Laser"],
        learn: "https://droyalspa.com/lipo-con-laser",
        book: "https://DRoyalSpaMiami.as.me/?appointmentType=91559773",
        video: "./lipo-video.mp4",
        poster: "./lipo-results.jpg",
        result: "./lipo-results.jpg"
      },
      {
        nameEs: "Lipo con Láser 360 con Transfer",
        nameEn: "Lipo Laser 360 with Transfer",
        textEs: "Combina definición corporal con transferencia para resaltar curvas, glúteos y contorno de cintura.",
        textEn: "Combines body contouring with transfer to enhance curves, buttocks, and waist definition.",
        chipsEs: ["Transfer","Glúteos","Cintura","Láser"],
        chipsEn: ["Transfer","Buttocks","Waist","Laser"],
        learn: "https://droyalspa.com/lipo-laser-con-transfer",
        book: "https://DRoyalSpaMiami.as.me/?appointmentType=91559810",
        video: "./transfer-video.mp4",
        poster: "./transfer-results.jpg",
        result: "./transfer-results.jpg"
      },
      {
        nameEs: "Lipo Papada con Láser 360",
        nameEn: "Chin Lipo Laser 360",
        textEs: "Ayuda a definir la mandíbula y el cuello para un perfil más limpio, fino y elegante.",
        textEn: "Helps define the jawline and neck for a cleaner, slimmer, and more refined profile.",
        chipsEs: ["Papada","Mandíbula","Cuello","Láser"],
        chipsEn: ["Double Chin","Jawline","Neck","Laser"],
        learn: "https://droyalspa.com/lipo-papada",
        book: "https://DRoyalSpaMiami.as.me/?appointmentType=91560745",
        video: "./chin-video.mp4",
        poster: "./chin-results.jpg",
        result: "./chin-results.jpg"
      },
      {
        nameEs: "D-Cool & RF",
        nameEn: "D-Cool & RF",
        textEs: "Tratamiento facial enfocado en firmeza, textura y rejuvenecimiento visible del rostro y cuello.",
        textEn: "Facial treatment focused on firmness, texture, and visible rejuvenation of the face and neck.",
        chipsEs: ["Rostro","Cuello","Firmeza","RF"],
        chipsEn: ["Face","Neck","Firmness","RF"],
        learn: "https://droyalspa.com/d-cool-regeneracion-con-celulas-madre",
        book: "https://DRoyalSpaMiami.as.me/?appointmentType=91560920",
        video: "./face-video.mp4",
        poster: "./face-results.jpg",
        result: "./face-results.jpg"
      },
      {
        nameEs: "Aumento de Senos sin Cirugía",
        nameEn: "Non-Surgical Breast Enhancement",
        textEs: "Ayuda a mejorar el volumen visual, la forma y el escote para una apariencia más armoniosa.",
        textEn: "Helps improve visual fullness, shape, and cleavage for a more balanced appearance.",
        chipsEs: ["Escote","Forma","Volumen","RF"],
        chipsEn: ["Cleavage","Shape","Fullness","RF"],
        learn: "https://droyalspa.com/new-page",
        book: "https://DRoyalSpaMiami.as.me/?appointmentType=91560087",
        video: "./breast-video.mp4",
        poster: "./breast-results.jpg",
        result: "./breast-results.jpg"
      },
      {
        nameEs: "Aumento de Glúteos sin Cirugía",
        nameEn: "Non-Surgical Butt Enhancement",
        textEs: "Ayuda a mejorar proyección, forma y apariencia levantada de los glúteos sin cirugía.",
        textEn: "Helps improve projection, shape, and a lifted appearance without surgery.",
        chipsEs: ["Glúteos","Forma","Proyección","RF"],
        chipsEn: ["Buttocks","Shape","Projection","RF"],
        learn: "https://droyalspa.com/piernas",
        book: "https://DRoyalSpaMiami.as.me/?appointmentType=91560697",
        video: "./glute-video.mp4",
        poster: "./glute-results.jpg",
        result: "./glute-results.jpg"
      },
      {
        nameEs: "Esculpido de Brazos 360 con Láser",
        nameEn: "Arm Sculpting 360 With Laser",
        textEs: "Ayuda a definir, afinar y mejorar la apariencia de los brazos para una línea más estilizada.",
        textEn: "Helps define, slim, and improve the appearance of the arms for a more sculpted line.",
        chipsEs: ["Brazos","Definición","Firmeza","Láser"],
        chipsEn: ["Arms","Definition","Firmness","Laser"],
        learn: "https://droyalspa.com/reduccion-de-brazos",
        book: "https://DRoyalSpaMiami.as.me/?appointmentType=91873037",
        video: "./arm-video.mp4",
        poster: "./arm-results.jpg",
        result: "./arm-results.jpg"
      },
      {
        nameEs: "Esculpido de Piernas 360 con Láser",
        nameEn: "Leg Sculpting 360 With Laser",
        textEs: "Ayuda a suavizar, definir y estilizar las piernas para un contorno más uniforme.",
        textEn: "Helps smooth, define, and contour the legs for a more streamlined look.",
        chipsEs: ["Piernas","Contorno","Suavidad","Láser"],
        chipsEn: ["Legs","Contour","Smoothness","Laser"],
        learn: "https://droyalspa.com/1-reduccion-de-celulitis-en-piernas",
        book: "https://DRoyalSpaMiami.as.me/?appointmentType=91873056",
        video: "./legs-video.mp4",
        poster: "./legs-results.jpg",
        result: "./legs-results.jpg"
      }
    ];

    const deck = document.getElementById('deck');
    const getName = (s) => isSpanish ? s.nameEs : s.nameEn;
    const getText = (s) => isSpanish ? s.textEs : s.textEn;
    const getChips = (s) => isSpanish ? s.chipsEs : s.chipsEn;

    function makeHomeRail() {
      return slides.slice(1).map((s, i) => `
        <button class="rail-btn" data-go="${i + 1}">
          <span>${getName(s)}</span>
          <span>›</span>
        </button>
      `).join("");
    }

    function makeMiniRail(index) {
      return slides.slice(1).map((s, i) => {
        const real = i + 1;
        if (real === index) return "";
        return `
          <button class="mini-rail-btn" data-go="${real}">
            <span>${getName(s)}</span>
            <span>›</span>
          </button>
        `;
      }).join("");
    }

    function mediaMarkup(slide, index) {
      return `
        <div class="media-stage">
          <video
            id="video-${index}"
            autoplay
            muted
            loop
            playsinline
            preload="metadata"
            poster="${slide.poster}"
            onerror="handleVideoError(${index})"
          >
            <source src="${slide.video}" type="video/mp4">
          </video>
          <img
            id="fallback-${index}"
            class="fallback-image"
            src="${slide.poster}"
            alt=""
          >
        </div>
      `;
    }

    deck.innerHTML = slides.map((slide, index) => {
      if (slide.type === "home") {
        return `
          <section class="slide home-slide active" data-slide="${index}">
            <div class="slide-inner">
              <div class="home-video-wrap">
                <video class="home-video" autoplay muted loop playsinline preload="metadata">
                  <source src="./home-video.mp4" type="video/mp4">
                </video>

                <div class="home-overlay"></div>

                <div class="home-center">
                  <h2 class="headline">${T.headline}</h2>
                  <div class="areas">${T.areas}</div>
                  <div class="offer"><b>25% OFF</b><span>${T.offer}</span></div>
                  <div class="home-tagline">${T.tagline}</div>
                  <a class="offer-phone" href="https://wa.me/17866900960" target="_blank" rel="noopener">${T.phoneLabel}</a>
                </div>

                <div class="swipe-hint"></div>

                <div class="home-rail">
                  ${makeHomeRail()}
                </div>
              </div>
            </div>
          </section>
        `;
      }

      return `
        <section class="slide treatment" data-slide="${index}">
          <div class="slide-inner">
            <div class="treatment-wrap">
              <div class="media-pane">
                ${mediaMarkup(slide, index)}
              </div>

              <div class="info-pane">
                <div class="page-card">
                  <div class="page-card-inner">
                    <div class="page-topline">
                      <button class="home-link" data-go="0">‹ ${T.home}</button>
                      <span>${index}/${slides.length - 1}</span>
                    </div>

                    <h2 class="page-title">${getName(slide)}</h2>
                    <p class="page-text">${getText(slide)}</p>

                    <div class="chips">
                      ${getChips(slide).map(c => `<span class="chip">${c}</span>`).join("")}
                    </div>

                    <div class="result-card">
                      <div class="result-lab">${T.results}</div>
                      <img src="${slide.result}" alt="${T.results}">
                    </div>

                    <div class="actions">
                      <a class="btn light" href="${slide.learn}" target="_blank" rel="noopener">${T.learn}</a>
                      <a class="
